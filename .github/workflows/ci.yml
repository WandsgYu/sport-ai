name: public-snapshot-checks

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile public source
        run: python -m compileall -q src tests
      - name: Run privacy and safety tests
        run: python -m unittest discover -s tests -v
