name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile source
        run: python -m compileall -q src tests
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Run synthetic success path
        run: PYTHONPATH=src python -m sport_lm.main
