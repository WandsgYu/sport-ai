name: Offline bug report
description: Report a reproducible defect in the sanitized reference code or offline tests.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Do not include personal data, credentials, internal endpoints, production logs,
        or details of the retired platform.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened in the public snapshot?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Offline reproduction
      description: Provide minimal steps using synthetic data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I used synthetic data and included no private or production information.
          required: true
