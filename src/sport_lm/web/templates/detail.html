<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_title }} · 事件链</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 920px; margin: auto; padding: 24px; background: #f5f7fb; }
      article { background: white; padding: 16px; margin: 12px 0; border-radius: 12px; }
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <a href="/">返回</a>
    <h1>脱敏事件链</h1>
    <p>请求引用：{{ request_id }}</p>
    {% for event in events %}
    <article><pre>{{ event | tojson(indent=2) }}</pre></article>
    {% else %}<p>没有找到事件。</p>{% endfor %}
  </body>
</html>
